name: Deploy FastOrderLogic

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Host → VM
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST_IP }}
          username: ${{ secrets.HOST_USER }}
          key: ${{ secrets.HOST_SSH_KEY }}
          script: |

            echo "Connected to HOST"

            ssh -o StrictHostKeyChecking=no mtmdash@192.168.1.60 "
                set -e

                echo 'Inside VM'

                cd /var/www/FastOrderLogic

                # 🔥 Inject token into remote (non-interactive)
                git remote set-url origin https://${{ secrets.GIT_TOKEN }}@github.com/Faquib/mtm-fol.git

                git fetch origin
                git reset --hard origin/main
                git clean -fd

                echo 'Repo synced'

                # FRONTEND
                cd frontend
                npm install
                npm run build -- --mode production

                echo 'Frontend built'

                # BACKEND
                cd ../backend
                source venv/bin/activate
                pip install -r requirements.txt

                sudo systemctl restart fastorderlogic-backend

                echo 'Backend restarted'

                sudo systemctl reload apache2

                echo 'Deployment complete'
            "
